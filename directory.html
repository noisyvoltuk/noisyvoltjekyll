---
layout: default
title: Business Directory
description: Find local businesses in our community
permalink: /directory/
---

<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --ink: #1a1a18;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8502a;
    --accent-light: #f0e0d8;
    --muted: #7a7570;
    --border: #d8d0c4;
  }

  .dir-wrap {
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    min-height: 100vh;
  }

  /* ── Hero ── */
  .dir-hero {
    background: var(--ink);
    color: var(--paper);
    padding: 72px 24px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .dir-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg, transparent, transparent 60px,
      rgba(255,255,255,0.03) 60px, rgba(255,255,255,0.03) 61px
    );
    pointer-events: none;
  }
  .dir-hero h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 400;
    letter-spacing: -0.01em;
    margin: 0 0 12px;
    line-height: 1.1;
  }
  .dir-hero h1 em { color: #e8a882; font-style: italic; }
  .dir-hero p {
    font-size: 1.05rem;
    color: #b0aaa0;
    margin: 0 auto 36px;
    max-width: 480px;
    font-weight: 300;
  }
  .dir-count {
    display: inline-block;
    background: rgba(200,80,42,0.25);
    color: #e8a882;
    border: 1px solid rgba(200,80,42,0.4);
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .dir-search-wrap {
    max-width: 560px;
    margin: 0 auto;
    position: relative;
  }
  .dir-search-wrap svg {
    position: absolute;
    left: 18px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    stroke: #7a7570;
    pointer-events: none;
    fill: none;
  }
  #dir-search {
    width: 100%;
    padding: 16px 20px 16px 48px;
    background: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    box-sizing: border-box;
  }
  #dir-search::placeholder { color: #aaa; }

  /* ── Controls ── */
  .dir-controls {
    max-width: 1100px;
    margin: 40px auto 0;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .dir-controls > span {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }
  .cat-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Grid ── */
  .dir-grid {
    max-width: 1100px;
    margin: 32px auto 80px;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }
  .dir-empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1.05rem;
  }

  /* ── Card ── */
  .biz-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
  }
  .biz-card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .biz-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .biz-icon {
    width: 48px; height: 48px;
    border-radius: 10px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .biz-badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .biz-cat-tag {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 9px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .biz-profile-badge {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #fff;
    background: var(--ink);
    padding: 3px 9px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .biz-name {
    font-family: 'Instrument Serif', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin: 0 0 6px;
    line-height: 1.2;
  }
  .biz-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 16px;
    flex: 1;
  }
  .biz-meta {
    display: flex;
    flex-direction: column;
    gap: 5px;
    border-top: 1px solid var(--cream);
    padding-top: 14px;
    margin-top: auto;
  }
  .biz-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .biz-meta-row svg { width: 14px; height: 14px; stroke: var(--muted); flex-shrink: 0; fill: none; }
  .biz-actions {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .biz-actions a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.83rem;
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: all 0.15s;
  }
  .biz-actions a svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }
  .biz-actions a.primary {
    color: #fff;
    background: var(--accent);
    padding: 7px 14px;
    border-radius: 6px;
  }
  .biz-actions a.primary:hover { background: #b04422; }
  .biz-actions a.secondary { color: var(--muted); }
  .biz-actions a.secondary:hover { color: var(--ink); }

  #dir-result-count {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    font-size: 0.85rem;
    color: var(--muted);
  }
</style>

<div class="dir-wrap">

  <div class="dir-hero">
    <div class="dir-count" id="dir-badge">Loading…</div>
    <h1>Local Business<br><em>Directory</em></h1>
    <p>Discover and support businesses in our community.</p>
    <div class="dir-search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="dir-search" placeholder="Search businesses, categories…" autocomplete="off">
    </div>
  </div>

  <div class="dir-controls">
    <span>Filter:</span>
    <button class="cat-btn active" data-cat="all">All</button>
  </div>

  <div style="max-width:1100px;margin:20px auto 0;padding:0 24px;">
    <p id="dir-result-count"></p>
  </div>

  <div class="dir-grid" id="dir-grid"></div>

</div>

<script>
// All businesses come from _data/businesses.yml — every entry always appears
// in the directory. For each one, we check if a matching _businesses/*.md file
// exists by looking for a collection item with the same title. If found,
// page_url is set and the card gets a "Full profile" link; otherwise it's "".
const BUSINESSES = [
  {% for biz in site.data.businesses %}
  {% assign profile = site.businesses | where: "key", biz.key | first %}
  {
    name:        {{ biz.name        | jsonify }},
    category:    {{ biz.category    | jsonify }},
    emoji:       {{ biz.emoji       | default: "🏪" | jsonify }},
    description: {{ biz.description | jsonify }},
    address:     {{ biz.address     | default: "" | jsonify }},
    phone:       {{ biz.phone       | default: "" | jsonify }},
    website:     {{ biz.website     | default: "" | jsonify }},
    page_url:    {{ profile.url     | default: "" | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
];

const grid     = document.getElementById('dir-grid');
const searchEl = document.getElementById('dir-search');
const badge    = document.getElementById('dir-badge');
const countEl  = document.getElementById('dir-result-count');
const controls = document.querySelector('.dir-controls');

let activeCategory = 'all';
let searchQuery    = '';

function buildCategoryButtons() {
  controls.querySelectorAll('.cat-btn:not([data-cat="all"])').forEach(b => b.remove());
  [...new Set(BUSINESSES.map(b => b.category))].forEach(cat => {
    const btn       = document.createElement('button');
    btn.className   = 'cat-btn';
    btn.dataset.cat = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => setCategory(cat));
    controls.appendChild(btn);
  });
}

function setCategory(cat) {
  activeCategory = cat;
  controls.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('active',
      (b.dataset.cat === 'all' && cat === 'all') || b.dataset.cat === cat
    )
  );
  render();
}

const ARROW_SVG = `<svg viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>`;
const EXT_SVG   = `<svg viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>`;

function cardHTML(b) {
  const hasProfile = b.page_url && b.page_url !== '';
  const hasWebsite = b.website  && b.website  !== '';

  const actions = (hasProfile || hasWebsite) ? `
    <div class="biz-actions">
      ${hasProfile
        ? `<a class="primary" href="${b.page_url}">Full profile ${ARROW_SVG}</a>`
        : `<a class="secondary" href="${b.website}" target="_blank" rel="noopener">Website ${EXT_SVG}</a>`
      }
    </div>` : '';

  return `
    <div class="biz-card">
      <div class="biz-header">
  
        <div class="biz-badges">
          <span class="biz-cat-tag">${b.category}</span>
          ${hasProfile ? `<span class="biz-profile-badge">Profile</span>` : ''}
        </div>
      </div>
      <div class="biz-name">${b.name}</div>
      <p class="biz-desc">${b.description}</p>
      <div class="biz-meta">
       
      </div>
      ${actions}
    </div>`;
}

function render() {
  const q = searchQuery.toLowerCase();
  const filtered = BUSINESSES.filter(b => {
    const matchesCat    = activeCategory === 'all' || b.category === activeCategory;
    const matchesSearch = !q ||
      b.name.toLowerCase().includes(q) ||
      b.category.toLowerCase().includes(q) ||
      b.description.toLowerCase().includes(q);
    return matchesCat && matchesSearch;
  });

  badge.textContent   = `${BUSINESSES.length} businesses listed`;
  countEl.textContent = filtered.length === BUSINESSES.length
    ? `Showing all ${filtered.length} businesses`
    : `Showing ${filtered.length} of ${BUSINESSES.length} businesses`;

  grid.innerHTML = filtered.length
    ? filtered.map(cardHTML).join('')
    : '<div class="dir-empty">No businesses found. Try a different search or filter.</div>';
}

searchEl.addEventListener('input', e => { searchQuery = e.target.value; render(); });
controls.querySelector('[data-cat="all"]').addEventListener('click', () => setCategory('all'));

buildCategoryButtons();
render();
</script>
